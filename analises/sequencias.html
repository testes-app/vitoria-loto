<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Sequências Consecutivas — Lotofácil</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
body{font-family:sans-serif;padding:2rem;background:#f5f5f5;color:#333;}
h1{font-size:20px;font-weight:500;margin-bottom:1rem;}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
.card{background:#fff;border-radius:8px;padding:0.75rem;text-align:center;}
.card small{display:block;font-size:12px;color:#888;}
.card strong{font-size:20px;}
.chart-box{background:#fff;border-radius:8px;padding:1rem;margin-bottom:1.5rem;}
.info{background:#fff;border-radius:8px;padding:1rem;font-size:13px;color:#555;line-height:1.7;}
</style>
</head>
<body>
<h1>Sequências Consecutivas — Lotofácil</h1>
<div class="cards">
  <div class="card"><small>Mais comum</small><strong>4 <span style="font-size:13px;color:#888">31.6%</span></strong></div>
  <div class="card"><small>4 ou 5 consecutivos</small><strong>58.8%</strong></div>
  <div class="card"><small>Recorde histórico</small><strong>14 <span style="font-size:13px;color:#888">1 vez</span></strong></div>
</div>
<div class="chart-box">
  <div style="position:relative;height:280px;"><canvas id="chart"></canvas></div>
</div>
<div class="info">
  Em <strong>58.8%</strong> dos sorteios aparecem exatamente 4 ou 5 números consecutivos. Jogos sem nenhuma sequência são raríssimos — só <strong>0.4%</strong> dos casos tiveram apenas 2 consecutivos como máximo.
</div>
<script>
const s=[{k:2,v:13,p:0.4},{k:3,v:450,p:12.4},{k:4,v:1151,p:31.6},{k:5,v:989,p:27.2},{k:6,v:566,p:15.5},{k:7,v:279,p:7.7},{k:8,v:112,p:3.1},{k:9,v:42,p:1.2},{k:10,v:30,p:0.8},{k:11,v:6,p:0.2},{k:12,v:3,p:0.1},{k:14,v:1,p:0.0}];
function cor(k){return k===4||k===5?'#D85A30':k===3||k===6?'#1D9E75':'#3c89d0';}
new Chart(document.getElementById('chart'),{
  type:'bar',
  data:{labels:s.map(d=>d.k+' consec.'),datasets:[{data:s.map(d=>d.p),backgroundColor:s.map(d=>cor(d.k)),borderRadius:4}]},
  options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${s[ctx.dataIndex].v} sorteios (${ctx.raw}%)`}}},
    scales:{y:{ticks:{callback:v=>v+'%'}},x:{ticks:{autoSkip:false}}}}
});
</script>
</body>
</html>

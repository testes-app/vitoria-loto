<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Parceiros — Lotofacil</title>

<style>
body{font-family:sans-serif;padding:2rem;background:#f5f5f5;color:#333;}
h1{font-size:20px;font-weight:500;margin-bottom:0.5rem;}
p{font-size:13px;color:#888;margin-bottom:1rem;}
.seletor{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:1.5rem;}
.btn{border-radius:8px;padding:8px;text-align:center;cursor:pointer;border:2px solid transparent;font-size:13px;font-weight:600;color:#fff;}
.btn.ativo{border:2px solid #333;}
.cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.5rem;}
.card{background:#fff;border-radius:8px;padding:0.75rem;text-align:center;}
.card small{display:block;font-size:12px;color:#888;}
.card strong{font-size:18px;}
.box{background:#fff;border-radius:8px;padding:1rem;margin-bottom:1.5rem;}
.legenda{display:flex;gap:16px;font-size:12px;color:#888;margin-bottom:8px;}
.leg{display:flex;align-items:center;gap:4px;}
.dot{width:10px;height:10px;border-radius:2px;}
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
.item{border-radius:8px;padding:6px 8px;display:flex;align-items:center;gap:6px;}
</style>
</head>

const seletor=document.getElementById("seletor");
for(let n=1;n<=25;n++){

function mostrar(n){
  document.querySelectorAll(".btn").forEach(b=>b.classList.remove("ativo"));
  document.getElementById("btn-"+n).classList.add("ativo");
  const d=todos[String(n)];
  const parc=d.parceiros;

  const sorted=[...parc].sort((a,b)=>b[2]-a[2]);
  document.getElementById("melhor").textContent="Nº "+String(sorted[0][0]).padStart(2,"0")+" ("+sorted[0][2]+"%)";
  document.getElementById("pior").textContent="Nº "+String(sorted[sorted.length-1][0]).padStart(2,"0")+" ("+sorted[sorted.length-1][2]+"%)";
  if(chartAtual)chartAtual.destroy();
  chartAtual=new Chart(document.getElementById("chart"),{
    type:"bar",
    data:{labels:parc.map(d=>String(d[0]).padStart(2,"0")),datasets:[{data:parc.map(d=>d[2]),backgroundColor:parc.map(d=>cor(d[2])),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>" "+parc[ctx.dataIndex][1]+" vezes ("+ctx.raw+"%)"}}},
      scales:{y:{min:53,max:65,ticks:{callback:v=>v+"%"}},x:{ticks:{autoSkip:false}}}}
  });
  const r=document.getElementById("ranking");r.innerHTML="";
  sorted.forEach((d,i)=>{
    const el=document.createElement("div");
    el.className="item";el.style.background=cor(d[2]);
    el.innerHTML="<span style='color:#fff;font-size:11px;min-width:20px;'>"+(i+1)+"º</span><span style='color:#fff;font-weight:600;font-size:13px;'>"+String(n).padStart(2,"0")+"+"+String(d[0]).padStart(2,"0")+"</span><span style='color:rgba(255,255,255,0.85);margin-left:auto;font-size:11px;'>"+d[2]+"%</span>";
    r.appendChild(el);
  });
}
mostrar(1);
</script>
